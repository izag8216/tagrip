<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a1a"/>
      <stop offset="50%" stop-color="#2D5A27"/>
      <stop offset="100%" stop-color="#2a5060"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#3A6B8C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="0" fill="url(#bg)"/>

  <!-- Decorative tag shapes (left side) -->
  <g opacity="0.15">
    <rect x="20" y="30" width="120" height="28" rx="4" fill="#fff"/>
    <polygon points="140,30 152,44 140,58" fill="#fff"/>
    <rect x="60" y="80" width="100" height="24" rx="4" fill="#fff"/>
    <polygon points="160,80 170,92 160,104" fill="#fff"/>
    <rect x="30" y="130" width="140" height="26" rx="4" fill="#fff"/>
    <polygon points="170,130 182,143 170,156" fill="#fff"/>
    <rect x="80" y="175" width="90" height="22" rx="4" fill="#fff"/>
    <polygon points="170,175 180,186 170,197" fill="#fff"/>
  </g>

  <!-- Decorative tag shapes (right side) -->
  <g opacity="0.1">
    <rect x="620" y="50" width="130" height="26" rx="4" fill="#fff"/>
    <polygon points="750,50 762,63 750,76" fill="#fff"/>
    <rect x="650" y="110" width="110" height="24" rx="4" fill="#fff"/>
    <polygon points="760,110 770,122 760,134" fill="#fff"/>
    <rect x="600" y="160" width="150" height="22" rx="4" fill="#fff"/>
    <polygon points="750,160 762,171 750,182" fill="#fff"/>
  </g>

  <!-- Hash symbol decoration -->
  <text x="200" y="130" font-family="monospace" font-size="80" fill="#ffffff" opacity="0.08" font-weight="bold">#</text>

  <!-- Title -->
  <text x="400" y="95" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="52" font-weight="700" fill="#ffffff">
    tagrip
  </text>

  <!-- Accent line -->
  <rect x="320" y="112" width="160" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="400" y="145" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="17" font-weight="400" fill="#c8d6c0">
    Smart Tag &amp; Keyword Extractor for Markdown
  </text>

  <!-- Small tag icons below subtitle -->
  <g transform="translate(270, 168)" opacity="0.5">
    <rect x="0" y="0" width="52" height="16" rx="3" fill="none" stroke="#8cb88c" stroke-width="1"/>
    <polygon points="52,0 60,8 52,16" fill="none" stroke="#8cb88c" stroke-width="1"/>
    <text x="22" y="12" text-anchor="middle" font-family="monospace" font-size="8" fill="#8cb88c">tag</text>
  </g>
  <g transform="translate(350, 168)" opacity="0.5">
    <rect x="0" y="0" width="62" height="16" rx="3" fill="none" stroke="#8cb88c" stroke-width="1"/>
    <polygon points="62,0 70,8 62,16" fill="none" stroke="#8cb88c" stroke-width="1"/>
    <text x="26" y="12" text-anchor="middle" font-family="monospace" font-size="8" fill="#8cb88c">keyword</text>
  </g>
  <g transform="translate(440, 168)" opacity="0.5">
    <rect x="0" y="0" width="52" height="16" rx="3" fill="none" stroke="#8cb88c" stroke-width="1"/>
    <polygon points="52,0 60,8 52,16" fill="none" stroke="#8cb88c" stroke-width="1"/>
    <text x="22" y="12" text-anchor="middle" font-family="monospace" font-size="8" fill="#8cb88c">extract</text>
  </g>
</svg>
